<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
	<defs>
		<linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
			<stop offset="0" stop-color="#1b2432"/>
			<stop offset="1" stop-color="#0d1117"/>
		</linearGradient>
		<linearGradient id="bubble" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0" stop-color="#56d364"/>
			<stop offset="1" stop-color="#2ea043"/>
		</linearGradient>
		<radialGradient id="glow" cx="0.35" cy="0.3" r="0.8">
			<stop offset="0" stop-color="#3fb950" stop-opacity="0.28"/>
			<stop offset="1" stop-color="#3fb950" stop-opacity="0"/>
		</radialGradient>
		<clipPath id="round"><rect width="512" height="512" rx="112"/></clipPath>
	</defs>

	<!-- background -->
	<g clip-path="url(#round)">
		<rect width="512" height="512" fill="url(#bg)"/>
		<rect width="512" height="512" fill="url(#glow)"/>
	</g>

	<!-- chat bubble -->
	<g>
		<path d="M118 300 V 262 a10 10 0 0 1 20 0 V 300 Z" fill="url(#bubble)"/>
		<rect x="72" y="92" width="300" height="200" rx="52" fill="url(#bubble)"/>
		<!-- chat lines -->
		<rect x="112" y="140" width="212" height="24" rx="12" fill="#0d1117" opacity="0.88"/>
		<rect x="112" y="182" width="170" height="24" rx="12" fill="#0d1117" opacity="0.88"/>
		<rect x="112" y="224" width="120" height="24" rx="12" fill="#0d1117" opacity="0.88"/>
	</g>

	<!-- magnifier / scope -->
	<g>
		<!-- handle -->
		<rect x="392" y="366" width="88" height="34" rx="17" transform="rotate(45 392 366)" fill="#2ea043"/>
		<rect x="388" y="370" width="80" height="26" rx="13" transform="rotate(45 388 370)" fill="#7ee787"/>
		<!-- lens -->
		<circle cx="352" cy="336" r="80" fill="#0d1117"/>
		<circle cx="352" cy="336" r="80" fill="none" stroke="#7ee787" stroke-width="22"/>
		<circle cx="352" cy="336" r="80" fill="none" stroke="#2ea043" stroke-width="22" stroke-opacity="0.35"/>
		<!-- crosshair -->
		<line x1="352" y1="304" x2="352" y2="368" stroke="#7ee787" stroke-width="9" stroke-linecap="round"/>
		<line x1="320" y1="336" x2="384" y2="336" stroke="#7ee787" stroke-width="9" stroke-linecap="round"/>
	</g>
</svg>
